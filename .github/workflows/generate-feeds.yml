name: Generate company feeds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "public/generated/**"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: generate-company-feeds
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'Marshall FI Company News Monitor marshall-FI@users.noreply.github.com' }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL || 'marshall-FI@users.noreply.github.com' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install feed generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r feed-generator/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Generate JSON and RSS feeds
        run: |
          python -m unittest feed-generator/test_sec_filings.py -v
          python feed-generator/generate.py
          mkdir -p feed-generator/.sec-cache
          python feed-generator/generate_sec_filings.py --print-snapshot-urls | while IFS=$'\t' read -r filename url; do
            (
              curl --fail --silent --show-error --location --connect-timeout 6 --max-time 15 "$url" --output "feed-generator/.sec-cache/$filename" || true
            ) &
            if (( $(jobs -r -p | wc -l) >= 4 )); then
              wait -n || true
            fi
          done
          wait
          python feed-generator/generate_sec_filings.py

      - name: Show source health
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("public/generated/articles.json").read_text(encoding="utf-8"))
          statuses = payload["statuses"]
          issues = [status for status in statuses if not status["ok"]]
          stale = [status for status in statuses if status["message"].startswith("STALE:")]
          print(f"articles={len(payload['articles'])} sources={payload['sourceCount']} healthy={len(statuses) - len(issues)} issues={len(issues)} stale={len(stale)}")
          for status in issues + stale:
            print(f"{status['sourceName']}: {status['message']}")

          sec_payload = json.loads(Path("public/generated/sec-filings.json").read_text(encoding="utf-8"))
          sec_statuses = sec_payload["statuses"]
          sec_issues = [status for status in sec_statuses if not status["ok"]]
          sec_stale = [status for status in sec_statuses if status["message"].startswith("STALE:")]
          print(f"sec_filings={sec_payload['filingCount']} sec_companies={sec_payload['companyCount']} sec_healthy={len(sec_statuses) - len(sec_issues)} sec_issues={len(sec_issues)} sec_stale={len(sec_stale)}")
          for status in sec_issues:
            print(f"SEC {status['company']} ({status['ticker']}): {status['message']}")
          PY

      - name: Commit generated feed artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated company feeds"
          file_pattern: public/generated/*.json public/generated/feeds/*.xml

      - name: Build GitHub Pages artifact
        run: python feed-generator/build_pages.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
